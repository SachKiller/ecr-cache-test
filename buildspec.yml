version: 0.2

env:
  variables:
    ECR_REPO_NAME: ecr-cache-test

phases:
  install:
    commands:
      - echo "Setting up docker buildx with containerd driver..."
      - docker buildx create --name containerd --driver=docker-container --driver-opt default-load=true

  pre_build:
    commands:
      - echo "Logging into ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - export IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:7}
      - echo "Image tag is $IMAGE_TAG"
      - export CACHE_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME

  build:
    commands:
      - echo "Building with ECR remote cache..."
      - |
        # First build won't have cache - build without cache-from if cache doesn't exist
        if docker buildx imagetools inspect $CACHE_REPO:cache > /dev/null 2>&1; then
          echo "Cache found, building with remote cache..."
          docker build \
            --cache-from type=registry,ref=$CACHE_REPO:cache \
            --cache-to type=registry,ref=$CACHE_REPO:cache,image-manifest=true \
            --tag $CACHE_REPO:$IMAGE_TAG \
            --builder=containerd \
            .
        else
          echo "No cache found, building from scratch and creating cache..."
          docker build \
            --cache-to type=registry,ref=$CACHE_REPO:cache,image-manifest=true \
            --tag $CACHE_REPO:$IMAGE_TAG \
            --builder=containerd \
            .
        fi

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $CACHE_REPO:$IMAGE_TAG
      - echo "Build completed successfully!"
